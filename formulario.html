<!DOCTYPE html>
<html>
<head>
  <title>Formulário de Contato</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }

    .form-group textarea {
      height: 150px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #45a049;
    }

    .success-message {
      color: green;
      margin-top: 10px;
    }

    .error-message {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Formulário de Contato</h2>
    <form method="post" action="enviar_email.php">
      <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
      </div>
      <div class="form-group">
        <label for="whatsapp">WhatsApp:</label>
        <input type="text" id="whatsapp" name="whatsapp" required>
      </div>
      <div class="form-group">
        <label for="mensagem">Escreva sua mensagem:</label>
        <textarea id="mensagem" name="mensagem" required></textarea>
      </div>
      <input type="submit" class="submit-btn" value="Enviar">
    </form>
  </div>
</body>
</html>
